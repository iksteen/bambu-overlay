name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Update Cargo version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.commit.outputs.commit }}
    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be semver-like, for example v1.2.3 or 1.2.3; got '$tag'"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Update Cargo version files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          manifest = Path("Cargo.toml")
          manifest_text = manifest.read_text()
          updated, replacements = re.subn(
              r'(?m)^(version\s*=\s*)"[^\"]+"',
              rf'\1"{version}"',
              manifest_text,
              count=1,
          )
          if replacements != 1:
              raise SystemExit("could not find package version in Cargo.toml")
          manifest.write_text(updated)

          lockfile = Path("Cargo.lock")
          lock_text = lockfile.read_text()
          updated, replacements = re.subn(
              r'(?ms)(\[\[package\]\]\nname = "bambu-overlay"\nversion = ")[^\"]+(")',
              rf'\g<1>{version}\2',
              lock_text,
              count=1,
          )
          if replacements != 1:
              raise SystemExit("could not find bambu-overlay package version in Cargo.lock")
          lockfile.write_text(updated)
          PY

      - name: Commit version files
        id: commit
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- Cargo.toml Cargo.lock; then
            git add Cargo.toml Cargo.lock
            git commit -m "chore: release v${VERSION}"
            git push origin HEAD:master
          fi

          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: bambu-overlay
            archive_kind: tar
            linker: ""
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: bambu-overlay
            archive_kind: tar
            linker: ""
          - label: windows-x86_64
            runner: ubuntu-24.04
            target: x86_64-pc-windows-gnu
            binary: bambu-overlay.exe
            archive_kind: zip
            linker: x86_64-w64-mingw32-gcc
    steps:
      - name: Check out release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.commit }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          packages=(pkg-config)

          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            packages+=(libssl-dev)
          fi

          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            packages+=(libssl-dev)
          fi

          if [[ "${{ matrix.target }}" == "x86_64-pc-windows-gnu" ]]; then
            packages+=(gcc-mingw-w64-x86-64 zip)
          fi

          sudo apt-get install -y --no-install-recommends "${packages[@]}"

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
          LINKER: ${{ matrix.linker }}
        shell: bash
        run: |
          if [[ -n "$LINKER" ]]; then
            cargo build --release --target "$TARGET" --config "target.$TARGET.linker=\"$LINKER\""
          else
            cargo build --release --target "$TARGET"
          fi

      - name: Package binary
        env:
          VERSION: ${{ needs.version.outputs.version }}
          LABEL: ${{ matrix.label }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          ARCHIVE_KIND: ${{ matrix.archive_kind }}
        shell: bash
        run: |
          package="bambu-overlay-v${VERSION}-${LABEL}"
          mkdir -p "dist/$package"
          cp "target/$TARGET/release/$BINARY" "dist/$package/"

          if [[ "$ARCHIVE_KIND" == "zip" ]]; then
            (cd dist && zip -9r "$package.zip" "$package")
          else
            (cd dist && tar -czf "$package.tar.gz" "$package")
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: bambu-overlay-${{ matrix.label }}
          path: dist/bambu-overlay-v${{ needs.version.outputs.version }}-${{ matrix.label }}.*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - version
      - build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -maxdepth 2 -type f -exec cp {} release/ \;
          (cd release && sha256sum * > SHA256SUMS)

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY:?}"
          tag="${GITHUB_REF_NAME:?}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --repo "$repo" --clobber
          else
            gh release create "$tag" release/* \
              --repo "$repo" \
              --verify-tag \
              --title "$tag" \
              --notes "Automated release for $tag."
          fi
